name: Release MCP Server

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test ./...

      - name: Validate installer
        run: sh -n scripts/install-mcp.sh

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache-dependency-path: go.sum

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          version="${GITHUB_REF_NAME#v}"
          asset="llm-provider-mcp_${GOOS}_${GOARCH}"
          mkdir -p "dist/${asset}"
          go build -trimpath -ldflags "-s -w -X main.version=${version}" \
            -o "dist/${asset}/llm-provider-mcp" ./cmd/llm-provider-mcp
          tar -C "dist/${asset}" -czf "dist/${asset}.tar.gz" llm-provider-mcp

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: llm-provider-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: [verify, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          pattern: llm-provider-mcp-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --verify-tag \
              --generate-notes \
              --title "$GITHUB_REF_NAME"
          fi
